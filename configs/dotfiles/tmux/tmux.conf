# =============================================================================
# tmux config — Dracula theme + vim hotkeys + resurrect
# =============================================================================

# ---------------------------------------------------------------------------
# General
# ---------------------------------------------------------------------------

set  -g default-terminal "tmux-256color"
set -ag terminal-overrides ",alacritty:RGB,kitty:RGB,xterm-256color:RGB"
set  -g history-limit 50000
set  -g mouse on
set  -g set-clipboard on
set  -g escape-time 0
set  -g focus-events on
set  -g renumber-windows on
set  -g base-index 1
setw -g pane-base-index 1

# ---------------------------------------------------------------------------
# Prefix  →  Ctrl-a  (more ergonomic than Ctrl-b)
# ---------------------------------------------------------------------------

unbind C-b
set -g prefix C-a
bind C-a send-prefix

# ---------------------------------------------------------------------------
# Reload config
# ---------------------------------------------------------------------------

bind r source-file ~/.config/tmux/tmux.conf \; display "Config reloaded ✓"

# ---------------------------------------------------------------------------
# Vim-style pane navigation
# ---------------------------------------------------------------------------

bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Alt + h/j/k/l  without prefix
bind -n M-h select-pane -L
bind -n M-j select-pane -D
bind -n M-k select-pane -U
bind -n M-l select-pane -R

# ---------------------------------------------------------------------------
# Vim-style pane resize  (prefix + H/J/K/L)
# ---------------------------------------------------------------------------

bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# ---------------------------------------------------------------------------
# Splits — intuitive keys, open in current path
# ---------------------------------------------------------------------------

bind | split-window -h  -c "#{pane_current_path}"
bind - split-window -v  -c "#{pane_current_path}"
bind c new-window       -c "#{pane_current_path}"
unbind '"'
unbind %

# ---------------------------------------------------------------------------
# Vim-style copy mode
# ---------------------------------------------------------------------------

setw -g mode-keys vi

bind Enter copy-mode
bind -T copy-mode-vi v      send -X begin-selection
bind -T copy-mode-vi V      send -X select-line
bind -T copy-mode-vi C-v    send -X rectangle-toggle
bind -T copy-mode-vi y      send -X copy-pipe-and-cancel "wl-copy"
bind -T copy-mode-vi Escape send -X cancel

# ---------------------------------------------------------------------------
# Window navigation
# ---------------------------------------------------------------------------

bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4
bind -n M-5 select-window -t 5
bind -n M-6 select-window -t 6
bind -n M-7 select-window -t 7
bind -n M-8 select-window -t 8
bind -n M-9 select-window -t 9

bind -n S-Left  previous-window
bind -n S-Right next-window

# Swap windows
bind -r < swap-window -d -t -1
bind -r > swap-window -d -t +1

# ---------------------------------------------------------------------------
# Dracula theme
# ---------------------------------------------------------------------------

# Pane borders
set -g pane-border-style        "fg=#6272a4"
set -g pane-active-border-style "fg=#bd93f9"

# Status bar
set -g status-position bottom
set -g status-style "bg=#282a36,fg=#f8f8f2"
set -g status-interval 5
set -g status-left-length 40
set -g status-right-length 80

set -g status-left  "#[fg=#282a36,bg=#bd93f9,bold]  #S #[fg=#bd93f9,bg=#282a36] "
set -g status-right "#[fg=#6272a4]  %H:%M #[fg=#44475a]│#[fg=#8be9fd]  #H "

# Window tabs
setw -g window-status-format         "#[fg=#6272a4] #I:#W "
setw -g window-status-current-format "#[fg=#282a36,bg=#44475a,bold] #I:#W #[fg=#44475a,bg=#282a36]"

# Messages
set -g message-style "bg=#44475a,fg=#f8f8f2"
set -g message-command-style "bg=#44475a,fg=#f8f8f2"

# Clock
setw -g clock-mode-colour "#bd93f9"

# ---------------------------------------------------------------------------
# TPM — Tmux Plugin Manager (auto-install)
# ---------------------------------------------------------------------------

# Bootstrap TPM if not installed
if "test ! -d ~/.tmux/plugins/tpm" \
   "run 'git clone https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm && ~/.tmux/plugins/tpm/bin/install_plugins'"

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

# ---------------------------------------------------------------------------
# tmux-resurrect  —  save/restore sessions
# ---------------------------------------------------------------------------

set -g @resurrect-capture-pane-contents 'on'
set -g @resurrect-strategy-nvim 'session'     # restore nvim sessions
set -g @resurrect-dir '~/.local/share/tmux/resurrect'

# Keybinds:   prefix + Ctrl-s  → save   |   prefix + Ctrl-r  → restore

# ---------------------------------------------------------------------------
# tmux-continuum  —  auto-save every 15 min
# ---------------------------------------------------------------------------

set -g @continuum-restore 'on'
set -g @continuum-save-interval '15'

# ---------------------------------------------------------------------------
# Initialize TPM  (keep this line at the very bottom)
# ---------------------------------------------------------------------------

run '~/.tmux/plugins/tpm/tpm'
